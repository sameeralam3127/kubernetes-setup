---
- name: Check whether worker node is already joined
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Ensure control plane produced a join command
  ansible.builtin.assert:
    that:
      - hostvars[groups['kube_control_plane'][0]].kubeadm_worker_join_command is defined
    fail_msg: "The control plane did not publish a worker join command."

- name: Join worker node to the cluster
  ansible.builtin.command:
    cmd: "{{ hostvars[groups['kube_control_plane'][0]].kubeadm_worker_join_command }}"
  when: not kubelet_conf.stat.exists
