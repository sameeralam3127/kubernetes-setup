---
- name: Check whether the control plane is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

- name: Initialize Kubernetes control plane
  ansible.builtin.command:
    cmd: >-
      kubeadm init
      --apiserver-advertise-address={{ ansible_default_ipv4.address }}
      --pod-network-cidr={{ pod_network_cidr }}
      --cri-socket={{ containerd_cri_socket }}
  register: kubeadm_init_result
  when: not kubeadm_admin_conf.stat.exists

- name: Ensure kubeconfig directory exists for cluster admin user
  ansible.builtin.file:
    path: "/home/{{ kubeconfig_user }}/.kube"
    state: directory
    owner: "{{ kubeconfig_user }}"
    group: "{{ kubeconfig_user }}"
    mode: "0700"

- name: Copy admin kubeconfig to cluster admin user
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ kubeconfig_user }}/.kube/config"
    remote_src: true
    owner: "{{ kubeconfig_user }}"
    group: "{{ kubeconfig_user }}"
    mode: "0600"

- name: Apply Calico CNI manifest
  ansible.builtin.command:
    cmd: "kubectl apply -f {{ calico_manifest_url }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: calico_apply_result
  changed_when: "'created' in calico_apply_result.stdout or 'configured' in calico_apply_result.stdout"

- name: Generate worker join command
  ansible.builtin.command:
    cmd: "kubeadm token create --print-join-command"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: kubeadm_join_command_result
  changed_when: false

- name: Publish worker join command for other hosts
  ansible.builtin.set_fact:
    kubeadm_worker_join_command: "{{ kubeadm_join_command_result.stdout }} --cri-socket {{ containerd_cri_socket }}"
